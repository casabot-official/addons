---
name: WebDAV server
description: Expose Home Assistant folders with WebDAV
url: "https://github.com/casabot-official/addons"
image: "ghcr.io/casabot-official/{arch}-addon-webdav"
version: dev
slug: webdav
startup: services
init: false
boot: auto
hassio_api: true
arch:
  - aarch64
  - amd64
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: WebDAV
map:
  - addon_config:rw
  - all_addon_configs:rw
  - homeassistant_config:rw
  - addons:rw
  - backup:rw
  - media:rw
  - share:rw
  - ssl:rw
options:
  custom_config: false
  document_root: /share/webdav
  logins:
    - username: dummyUser
      password: null
schema:
  custom_config: bool
  document_root: str
  logins:
    - username: str
      password: password
